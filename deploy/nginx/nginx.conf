# ── 레이트 리미팅 존 정의 ────────────────────────────────────────────
# 메모리 10m = 약 160,000개 IP 추적 가능
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;   # 일반 API: IP당 분당 60회
limit_req_zone $binary_remote_addr zone=api_upload:10m   rate=10r/m;   # 업로드: IP당 분당 10회
limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=10r/m;   # 인증: IP당 분당 10회
limit_req_zone $binary_remote_addr zone=static_files:10m rate=300r/m;  # 정적파일: IP당 분당 300회

# ── 연결 수 제한 존 ──────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP → HTTPS 리다이렉트 + certbot 인증 경로 허용
server {
    listen 80;
    server_name doc-tr.chakanag.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 본문
server {
    listen 443 ssl http2;
    server_name doc-tr.chakanag.me;

    ssl_certificate     /etc/letsencrypt/live/doc-tr.chakanag.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doc-tr.chakanag.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 업로드 최대 크기 (앱 설정 20MB보다 약간 크게)
    client_max_body_size 25M;

    # 실제 IP 전달
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── 동시 연결 수 제한 (IP당 최대 20개) ──────────────────────────
    limit_conn conn_limit 20;

    # ── 업로드 엔드포인트: 분당 10회, 버스트 5개까지 허용 ─────────
    location = /api/documents {
        limit_req zone=api_upload burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ── 인증 엔드포인트: 분당 10회, 버스트 3개까지 허용 ──────────
    location /api/auth/ {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
    }

    # ── 일반 API: 분당 60회 ───────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ── 정적 파일 / 기타 ─────────────────────────────────────────
    location / {
        limit_req zone=static_files burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }
}
