# ═══════════════════════════════════════════════════════════════════════
# 레이어 1 — map 기반 악성 요청 분류 (http 컨텍스트, server 블록 외부)
# ═══════════════════════════════════════════════════════════════════════

# ── 레이트 리미팅 존 ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=20r/m;  # login/register 전용
limit_req_zone $binary_remote_addr zone=api_me:10m       rate=120r/m; # /me 는 페이지 로드마다 호출
limit_req_zone $binary_remote_addr zone=static_files:10m rate=300r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── DNS 프로브 / 측정 봇 탐지 (쿼리 문자열) ─────────────────────────
# ?dns=... / ?name=...&type=A 같은 DNS-over-HTTPS 스캔 패턴
map $query_string $is_dns_probe {
    default                     0;
    ~*(?:^|&)dns=               1;
    ~*(?:^|&)type=[aA]&         1;
    ~*(?:^|&)type=[aA]$         1;
    ~*\.odns\.                  1;
    ~*dnsmeasure                1;
}

# ── 알려진 악성/스캔 경로 ─────────────────────────────────────────────
map $uri $is_bad_path {
    default                                                             0;
    # 스크립트/설정 파일 확장자
    ~*\.(php|asp|aspx|jsp|cgi|pl|sh|bash|env|ini|xml|bak|sql|log)$    1;
    # 관리자 패널 / 알려진 취약 경로
    ~*/(wp-admin|wp-login|wp-content|xmlrpc\.php)                      1;
    ~*/(phpmyadmin|pma|myadmin|mysqladmin|adminer)                     1;
    ~*/(cPanel|cpanel|webmail|roundcube|squirrelmail)                  1;
    ~*/(developmentserver|metadatauploader|actuator|swagger|graphql)   1;
    ~*/(\.env|\.git|\.svn|\.hg|\.DS_Store|composer\.json|package\.json) 1;
    ~*/(solr|jenkins|jira|confluence|elastic|kibana)                   1;
    ~*/(manager/html|host-manager|invoker/readonly)                    1;
    # 경로 순회
    ~*(\.\./|\.\.\\|%2e%2e%2f|%252e%252e|%c0%af)                     1;
    ~*(/etc/passwd|/etc/shadow|/windows/system32|/boot\.ini)           1;
}

# ── 인젝션 패턴 (URL 전체 대상) ──────────────────────────────────────
map $request_uri $is_injection {
    default                                                             0;
    # SQL Injection
    ~*(?i)(union[\s\+]+select|insert[\s]+into|drop[\s]+table)          1;
    ~*(?i)(select[\s]+\*[\s]+from|delete[\s]+from|update[\s]+set)      1;
    ~*(?i)(or[\s]+1[\s]*=[\s]*1|and[\s]+1[\s]*=[\s]*1|'[\s]*or[\s]*') 1;
    # XSS
    ~*(?i)(<script[\s>]|javascript:|vbscript:|data:text/html)          1;
    ~*(?i)(onerror[\s]*=|onload[\s]*=|onclick[\s]*=|onfocus[\s]*=)     1;
    ~*(?i)(alert[\s]*\(|confirm[\s]*\(|prompt[\s]*\()                  1;
    # 원격 코드 실행
    ~*(?i)(exec[\s]*\(|system[\s]*\(|passthru[\s]*\(|popen[\s]*\()    1;
    ~*(?i)(base64_decode[\s]*\(|eval[\s]*\()                           1;
    ~*(?i)(\|[\s]*(bash|sh|cmd|powershell|wget|curl|nc|netcat))        1;
    # SSRF / 내부망 탐색
    ~*(?i)(file:///|gopher://|dict://|ldap://)                         1;
    ~*(?i)(169\.254\.169\.254|metadata\.google\.internal)              1;
    # Log4j / 템플릿 인젝션
    "~*(\$\{jndi:|%24%7bjndi:|#{.*}|\{\{.*\}\})"                      1;
}

# ── 악성 / 빈 User-Agent ─────────────────────────────────────────────
map $http_user_agent $is_bad_agent {
    default                                                             0;
    ""                                                                  1;  # 빈 UA
    ~*(?i)(nikto|sqlmap|nmap|masscan|zgrab|nuclei|zmap)                1;
    ~*(?i)(dirbuster|gobuster|wfuzz|ffuf|feroxbuster|dirb)             1;
    ~*(?i)(hydra|medusa|burpsuite|acunetix|appscan|nessus)             1;
    ~*(?i)(metasploit|msfconsole|armitage|cobalt.strike)               1;
    ~*(?i)(python-requests/1\.|python-urllib|go-http-client/1\.)       1;
    ~*(?i)(scanner|exploit|fuzzer|injector|attacker|hacker)            1;
    ~*(?i)(masscan|libwww-perl|lwp-|peach|w3af|havij)                  1;
}

# ═══════════════════════════════════════════════════════════════════════
# HTTP → HTTPS 리다이렉트
# ═══════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name doc-tr.chakanag.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════════════════
# HTTPS 메인 서버
# ═══════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    http2 on;
    server_name doc-tr.chakanag.me;

    ssl_certificate     /etc/letsencrypt/live/doc-tr.chakanag.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doc-tr.chakanag.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # 업로드 최대 크기
    client_max_body_size 25M;

    # 실제 IP 전달
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── 동시 연결 수 제한 (IP당 최대 20개) ──────────────────────────
    limit_conn conn_limit 20;

    # ═══════════════════════════════════════════════════════════════
    # 레이어 2 — 악성 요청 조기 차단 (location 블록 진입 전)
    # 444 = 응답 없이 연결 끊기 (스캐너에 서버 존재 노출 최소화)
    # ═══════════════════════════════════════════════════════════════

    # DNS 프로브: 쿼리 문자열에 dns= / type=A 포함
    if ($is_dns_probe)  { return 444; }

    # 알려진 악성 경로 (php, wp-admin, metadatauploader 등)
    if ($is_bad_path)   { return 444; }

    # 인젝션 패턴 (SQLi, XSS, RCE, Log4j 등)
    if ($is_injection)  { return 400; }

    # 악성/빈 User-Agent
    if ($is_bad_agent)  { return 444; }

    # ── /me 엔드포인트: 페이지 로드마다 호출되므로 별도 관대한 존 ──
    location = /api/auth/me {
        limit_req zone=api_me burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
    }

    # ── 로그인/가입 엔드포인트: 분당 20회 ───────────────────────────
    location /api/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
    }

    # ── 업로드: 분당 10회 ────────────────────────────────────────────
    location = /api/documents {
        limit_req zone=api_upload burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ── 일반 API: 분당 60회 ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ── 정적 파일 / 루트 ─────────────────────────────────────────────
    location / {
        # 루트에 불필요한 쿼리 파라미터가 있으면 400 반환
        if ($query_string ~ ".+") {
            return 400;
        }
        limit_req zone=static_files burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8010;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }
}

# ═══════════════════════════════════════════════════════════════════════
# IP 직접 접근 / 잘못된 Host 헤더 → 응답 없음
# (스캐너가 IP로 직접 때리는 경우 차단)
# ═══════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl default_server;
    http2 on;
    ssl_certificate     /etc/letsencrypt/live/doc-tr.chakanag.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doc-tr.chakanag.me/privkey.pem;
    return 444;
}
